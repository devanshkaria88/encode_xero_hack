services:
  db:
    image: postgres:16-alpine
    container_name: robyn-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: robyn
      POSTGRES_PASSWORD: robyn
      POSTGRES_DB: robyn
    ports:
      - "5432:5432"
    volumes:
      - robyn-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robyn -d robyn"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  robyn-pgdata:
